# LPFM station configuration
# All tunable parameters live here. No defaults are buried in code.

[stream]
url = ""                 # overridden by LPFM_STREAM_URL in .env
buffer_seconds = 5
retry_limit = 5
retry_delay_seconds = 10

[broadcast]
windows = [
    { start = "06:00", end = "22:00" }
]

[relay]
url = ""                    # overridden by LPFM_RELAY_URL in .env
on_path = ""                # overridden by LPFM_RELAY_ON_PATH in .env
off_path = ""               # overridden by LPFM_RELAY_OFF_PATH in .env
status_path = ""            # overridden by LPFM_RELAY_STATUS_PATH in .env
verify_retries = 5          # number of state-check retries after a command
verify_delay_seconds = 1    # seconds between retries

[audio]
format = ""                 # overridden by LPFM_AUDIO_FORMAT in .env ("alsa" on Pi, "audiotoolbox" on macOS)
device = ""                 # overridden by LPFM_AUDIO_DEVICE in .env ("hw:2,0" on Pi, "default" on macOS)
device_name = "USB Audio"   # name used to locate the ALSA card in aplay -l
output_volume = 100         # overridden by LPFM_OUTPUT_VOLUME in .env (0–100; ALSA only)

[scheduler]
decision_time = "08:00"              # time of day to make the daily broadcast decision
window_start = "19:00"               # earliest the broadcast may begin
window_end = "06:00"                 # latest the broadcast may end (crosses midnight)
start_leeway_max_minutes = 240       # max offset from window_start for random start pick
stop_leeway_max_minutes = 240        # max offset back from window_end for random stop pick
state_file = "state/scheduler.json"  # persisted risk and decision state

[risk]
# Exponential moving average: accumulated = decay × prev_accumulated + (1−decay) × today_risk
# decay_factor controls how much history persists. Higher = slower to respond, longer memory.
# Half-life of past risk: solve decay^n = 0.5 → n = log(0.5)/log(decay)
#   decay=0.5 → half-life ~1 day   decay=0.7 → ~2 days   decay=0.9 → ~6 days
decay_factor = 0.7

weight_start = 1.0          # relative weight of start-time risk (normalized at runtime)
weight_stop = 0.8           # relative weight of stop-time risk
weight_duration = 0.8       # relative weight of broadcast duration risk
weight_day = 0.5            # relative weight of day-of-week risk

# Controls how aggressively the time-picker skews toward safer times when risk is elevated.
# The picker uses a Beta(1, k) distribution where k = 1 + accumulated_risk × sensitivity.
# At k=1 (zero risk) the distribution is uniform. As k grows, draws cluster toward larger
# offsets from window boundaries (later start, earlier stop = shorter, safer broadcast).
# Higher sensitivity = stronger skew under pressure; 0 = always uniform (disables feature).
#   sensitivity=2 → mild skew   sensitivity=3 → moderate   sensitivity=5 → aggressive
time_picker_sensitivity = 3.0

# Sigmoid probability curve: probability = 1 / (1 + exp(steepness × (acc − midpoint)))
# midpoint: accumulated_risk at which broadcast probability = 50%. Higher = more permissive.
# steepness: sharpness of the S-curve. Higher = harder cutoff around the midpoint.
#   At low accumulated risk the sigmoid is forgiving; past midpoint it drops quickly.
sigmoid_midpoint  = 0.55
sigmoid_steepness = 8.0

[risk.day_weights]
monday    = 1.0
tuesday   = 0.8
wednesday = 0.6
thursday  = 0.4
friday    = 0.2
saturday  = 0.0
sunday    = 0.0

[notifications]
enabled = true

[watchdog]
poll_interval_seconds = 10      # how often to check stream health
restart_attempts = 1440         # max restart attempts before giving up (1440 × 30s = 12h)
restart_cooldown_seconds = 30   # wait between restart attempts

[fallback]
audio_dir = "content/fallback"
file_extensions = ["mp3", "wav", "flac", "ogg", "aiff"]

[control_panel]
port = 8080
history_entries = 5

[logging]
level = "INFO"
